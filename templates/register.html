{% extends "base.html" %}

{% block title %}Create Account - Inspection Processor{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md">
        <div class="bg-white/70 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/40 transform transition-all hover:scale-[1.01]">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl shadow-lg mb-6 ring-4 ring-primary-100/50">
                    <i class="fas fa-user-plus text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-3">Create Account</h1>
                <p class="text-gray-500 font-medium">Join us to start managing your reports</p>
            </div>

            <form action="{{ url_for('register') }}" method="POST" class="space-y-5">
                <div>
                    <label for="name" class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                    <input type="text" name="name" id="name" required placeholder="John Doe"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition-all font-medium text-sm">
                </div>
                <div>
                    <label for="email" class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <input type="email" name="email" id="email" required placeholder="name@company.com"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition-all font-medium text-sm">
                </div>
                <div>
                    <label for="password" class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" name="password" id="password" required placeholder="Min. 8 characters"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition-all font-medium text-sm">
                </div>
                
                <div class="flex items-start space-x-3 ml-1 py-2">
                    <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500 cursor-pointer">
                    <label for="terms" class="text-xs text-gray-500 leading-relaxed cursor-pointer">
                        I agree to the <a href="#" class="text-primary-600 font-bold hover:underline">Terms of Service</a> and <a href="#" class="text-primary-600 font-bold hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="w-full py-4 bg-primary-600 text-white rounded-2xl font-bold text-sm shadow-xl shadow-primary-200 hover:bg-primary-700 hover:-translate-y-0.5 transition-all active:translate-y-0">
                    Create My Account
                </button>
            </form>

            <div class="mt-8 text-center pt-8 border-t border-gray-100">
                <p class="text-sm text-gray-500">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" class="text-primary-600 font-bold hover:text-primary-700 transition-colors">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
