<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — {{ file.file_name }} | InspectAI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- 3rd party libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Alex+Brush&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; overflow: hidden; background: #e0e5ec; }
    body { display: flex; flex-direction: column; font-family: 'Manrope', sans-serif; }

    /* ── Header ── */
    .editor-header {
      height: 60px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--sp-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: var(--sp-3); min-width: 0; }
    .header-right { display: flex; align-items: center; gap: var(--sp-2); }
    
    @media(max-width: 640px) {
      .brand-meta { display: none; }
      .editor-header { height: 50px; padding: 0 var(--sp-2); }
    }

    /* ── Canvas Viewport ── */
    .viewport {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: var(--sp-6);
      position: relative;
    }
    #canvas-wrapper {
      background: white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      border-radius: 2px;
      position: relative;
    }

    /* ── Floating Nav Menu (The "Dock") ── */
    .editor-dock-container {
      position: fixed;
      bottom: var(--sp-6);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: auto;
      max-width: calc(100% - 2rem);
    }
    
    /* Tray / Popover */
    .dock-tray {
      width: 340px;
      background: var(--white);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
      margin-bottom: var(--sp-3);
      padding: var(--sp-5);
      display: none;
      animation: slideUpFade 0.25s var(--ease);
    }
    .dock-tray.active { display: block; }
    
    /* The Dock Bar itself */
    .dock-bar {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: var(--r-full);
      padding: 6px;
      display: flex;
      gap: 6px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .dock-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-600);
      transition: var(--transition);
      position: relative;
    }
    .dock-btn i { font-size: 1.1rem; }
    .dock-btn span { font-size: 0.6rem; font-weight: 800; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.02em; }
    
    .dock-btn:hover { background: rgba(0,0,0,0.05); color: var(--primary); }
    .dock-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: var(--shadow-green);
    }

    /* ── Floating Controls ── */
    .zoom-ctrl {
      position: fixed;
      bottom: var(--sp-6);
      right: var(--sp-6);
      background: var(--white);
      border-radius: var(--r-full);
      box-shadow: var(--shadow-lg);
      padding: 4px;
      display: flex;
      gap: 2px;
      z-index: 100;
      border: 1px solid var(--border);
    }
    @media(max-width:768px) { .zoom-ctrl { display: none; } }

    /* ── Shared Tray Styles ── */
    .tray-title { font-family: 'Sora', sans-serif; font-weight: 800; font-size: var(--text-sm); margin-bottom: var(--sp-4); display: flex; align-items:center; gap:var(--sp-2); }
    
    .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .tool-btn-small {
      padding: 10px 4px;
      background: var(--surface-alt);
      border: 1.5px solid transparent;
      border-radius: var(--r-md);
      display: flex;
      flex-direction: column;
      align-items:center;
      gap: 4px;
      cursor: pointer;
      transition: var(--transition);
    }
    .tool-btn-small i { color: var(--text-600); font-size: 1rem; }
    .tool-btn-small span { font-size: 0.6rem; font-weight: 800; color: var(--text-faint); text-transform: uppercase; }
    .tool-btn-small:hover { border-color: var(--primary); }
    .tool-btn-small.active { border-color: var(--primary); background: var(--green-50); }
    .tool-btn-small.active i { color: var(--primary); }

    /* Transitions */
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .hidden { display: none !important; }
    
    /* Modals */
    .modal-sheet {
       position: fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:2000;
       display:flex; align-items:center; justify-content:center; padding:1rem;
    }
    .sig-canvas-wrap { border: 2px dashed var(--border-2); border-radius: var(--r-lg); background: #fdfdfd; cursor: crosshair; }

    /* Nav labels */
    .nav-label-pill {
      background: var(--surface-alt); padding: 0.25rem 0.75rem; border-radius: var(--r-full);
      font-size: var(--text-xs); font-family: 'Sora', sans-serif; font-weight: 800; color: var(--primary);
      border: 1px solid var(--border);
    }

    /* Signature Tabs */
    .sig-tabs { display: flex; gap: var(--sp-2); margin-bottom: var(--sp-4); }
    .sig-tab { flex: 1; text-align: center; padding: var(--sp-2); border-bottom: 2px solid var(--border); font-size: var(--text-sm); font-weight: 700; color: var(--text-muted); cursor: pointer; transition:var(--transition); }
    .sig-tab:hover { color: var(--primary); }
    .sig-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--green-50); border-radius: var(--r-md) var(--r-md) 0 0; }
    .sig-pane { display: none; }
    .sig-pane.active { display: block; }
    
    .font-preview { font-size: 24px; padding: var(--sp-3); border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer; text-align: center; margin-bottom: var(--sp-2); transition:var(--transition); }
    .font-preview:hover, .font-preview.selected { border-color: var(--primary); background: var(--green-50); }
    
    .flex-center { display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<header class="editor-header">
  <div class="header-left">
    <a href="/file/{{ file.file_id }}" class="btn btn-ghost btn-sm" style="width:36px; height:36px; padding:0; border-radius:50%;">
      <i class="fas fa-close"></i>
    </a>
    <div class="brand-meta">
      <div style="font-weight:800; font-size:var(--text-sm); line-height:1;">{{ file.file_name }}</div>
      <div style="font-size:10px; color:var(--text-faint); margin-top:2px; font-weight:600;">ACTIVE EDITOR</div>
    </div>
  </div>

  <div class="header-right">
    <div style="display:flex; align-items:center; gap:var(--sp-1); background:var(--surface-alt); padding:4px; border-radius:var(--r-full); border:1px solid var(--border);">
      <button onclick="navigate(-1)" id="btn-prev" class="btn btn-ghost btn-sm" style="width:28px; height:28px; padding:0;"><i class="fas fa-chevron-left"></i></button>
      <span id="page-counter" style="font-size:12px; font-weight:800; padding:0 8px; font-family:'Sora',sans-serif; color:var(--primary); white-space:nowrap;">Pg. 1</span>
      <button onclick="navigate(1)"  id="btn-next" class="btn btn-ghost btn-sm" style="width:28px; height:28px; padding:0;"><i class="fas fa-chevron-right"></i></button>
    </div>
    <button onclick="saveReport()" id="btn-save" class="btn btn-primary btn-sm" style="margin-left:var(--sp-2)">
      <i class="fas fa-floppy-disk"></i> <span class="brand-meta">Save</span>
    </button>
  </div>
</header>

<main class="viewport" id="canvas-container">
  <div id="canvas-wrapper">
    <canvas id="report-canvas"></canvas>
    <div id="loader" class="flex-center" style="position:absolute; inset:0; background:white; z-index:10;">
       <i class="fas fa-circle-notch fa-spin" style="font-size:2rem; color:var(--primary);"></i>
    </div>
  </div>
</main>

<!-- ── Floating Dock ── -->
<div class="editor-dock-container">
  
  <!-- Trays -->
  <div id="tray-title" class="dock-tray">
    <div class="tray-title"><i class="fas fa-heading"></i>Add Page Header</div>
    <div class="form-group" style="margin-bottom:12px;">
       <input type="text" id="title-input" class="input" placeholder="e.g. Daily Inspection Report">
    </div>
    <button onclick="placeTitle()" class="btn btn-primary btn-sm" style="width:100%; border-radius:var(--r-md);">
       <i class="fas fa-plus"></i> Place Title
    </button>
  </div>

  <div id="tray-remarks" class="dock-tray">
    <div class="tray-title"><i class="fas fa-quote-left"></i>Observations</div>
    <div class="form-group" style="margin-bottom:12px;">
       <textarea id="remarks-input" class="input" rows="3" placeholder="Write out specific observations…"></textarea>
    </div>
    <button onclick="placeContent()" class="btn btn-primary btn-sm" style="width:100%; border-radius:var(--r-md);">
       <i class="fas fa-plus"></i> Place Text
    </button>
  </div>

  <div id="tray-format" class="dock-tray">
    <div class="tray-title"><i class="fas fa-sliders"></i>Styling & Ticks</div>
    <div class="tool-grid">
       <div onclick="toggleBold()" class="tool-btn-small"><i class="fas fa-bold"></i><span>Bold</span></div>
       <div onclick="toggleItalic()" class="tool-btn-small"><i class="fas fa-italic"></i><span>Italic</span></div>
       <div onclick="setTool('tick-green')" id="tool-tick" class="tool-btn-small"><i class="fas fa-check" style="color:var(--primary);"></i><span>Tick</span></div>
       <div onclick="deleteSelected()" class="tool-btn-small" style="background:var(--danger-light);"><i class="fas fa-trash-alt" style="color:var(--danger);"></i><span style="color:var(--danger);">Delete</span></div>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; background:var(--surface-alt); padding:8px 12px; border-radius:var(--r-md);">
       <span style="font-size:11px; font-weight:800; color:var(--text-faint);">SIZE</span>
       <div style="display:flex; align-items:center; gap:8px;">
          <button onclick="adjustFontSize(-2)" class="btn btn-ghost btn-sm" style="width:24px; height:24px; padding:0;">-</button>
          <span id="font-size-val" style="font-weight:900; font-size:13px; min-width:20px; text-align:center;">22</span>
          <button onclick="adjustFontSize(2)" class="btn btn-ghost btn-sm" style="width:24px; height:24px; padding:0;">+</button>
       </div>
    </div>
  </div>

  <!-- Dock Bar -->
  <nav class="dock-bar">
    <button onclick="toggleTray('tray-title', this)" class="dock-btn">
      <i class="fas fa-heading"></i><span>Title</span>
    </button>
    <button onclick="toggleTray('tray-remarks', this)" class="dock-btn">
      <i class="fas fa-align-left"></i><span>Note</span>
    </button>
    <button onclick="toggleTray('tray-format', this)" class="dock-btn">
      <i class="fas fa-square-check"></i><span>Tools</span>
    </button>
    <button onclick="openSignatureModal()" class="dock-btn">
      <i class="fas fa-signature"></i><span>Sign</span>
    </button>
    <button onclick="downloadPDF('single')" class="dock-btn" style="color:var(--danger);">
      <i class="fas fa-file-pdf"></i><span>PDF</span>
    </button>
  </nav>
</div>

<!-- Zoom Footer (Desktop) -->
<div class="zoom-ctrl">
  <button onclick="zoomOut()"  class="btn btn-ghost btn-icon btn-sm"><i class="fas fa-minus"></i></button>
  <span id="zoom-label" style="font-size:11px; font-weight:900; align-self:center; min-width:40px; text-align:center; color:var(--primary);">100%</span>
  <button onclick="zoomIn()"   class="btn btn-ghost btn-icon btn-sm"><i class="fas fa-plus"></i></button>
  <button onclick="resetZoom()" class="btn btn-ghost btn-sm" style="font-size:10px; font-weight:800;">AUTO</button>
</div>

<!-- Signature Modal -->
<div id="sig-modal" class="modal-sheet hidden">
  <div class="card" style="width:100%; max-width:480px; padding:1.5rem; max-height: 90vh; overflow-y: auto;">
    <h3 style="font-size:16px; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center;">
       Digital Signature
       <button onclick="closeSignatureModal()" class="btn btn-ghost btn-sm"><i class="fas fa-times"></i></button>
    </h3>
    
    <div class="sig-tabs">
      <div class="sig-tab active" onclick="switchSigTab('draw', event)">Draw</div>
      <div class="sig-tab" onclick="switchSigTab('type', event)">Type</div>
      <div class="sig-tab" onclick="switchSigTab('upload', event)">Upload</div>
    </div>

    <!-- Draw Pane -->
    <div id="sig-pane-draw" class="sig-pane active">
      <div class="sig-canvas-wrap mb-4">
         <canvas id="sig-pad" style="width:100%; height:200px; display:block;"></canvas>
      </div>
      <div style="display:flex; justify-content:space-between;">
         <button onclick="sigPad.clear()" class="btn btn-secondary btn-sm">Clear</button>
         <button onclick="applySignatureDraw()" class="btn btn-primary btn-sm">Place on Page</button>
      </div>
    </div>

    <!-- Type Pane -->
    <div id="sig-pane-type" class="sig-pane">
       <input type="text" id="sig-type-input" class="input mb-4" placeholder="Type your name..." oninput="updateSigTypePreviews()">
       <div style="max-height: 220px; overflow-y: auto; padding-right:8px;" class="mb-4">
         <div class="font-preview selected" style="font-family:'Dancing Script', cursive;" onclick="selectSigFont(0, this)">InspectAI Signature</div>
         <div class="font-preview" style="font-family:'Alex Brush', cursive;" onclick="selectSigFont(1, this)">InspectAI Signature</div>
         <div class="font-preview" style="font-family:'Great Vibes', cursive;" onclick="selectSigFont(2, this)">InspectAI Signature</div>
       </div>
       <button onclick="applySignatureType()" class="btn btn-primary btn-sm" style="width:100%;">Place on Page</button>
    </div>

    <!-- Upload Pane -->
    <div id="sig-pane-upload" class="sig-pane">
       <div class="sig-canvas-wrap flex-center mb-2" style="height:170px; flex-direction:column; gap:var(--sp-2); cursor:pointer;" onclick="document.getElementById('sig-upload-input').click()">
         <i class="fas fa-image" style="font-size:2rem; color:var(--text-faint);"></i>
         <span style="font-weight:700; color:var(--text-muted);">Click to upload PNG/JPG</span>
       </div>
       <input type="file" id="sig-upload-input" accept="image/png, image/jpeg" style="display:none;" onchange="handleSigUpload(event)">
       
       <label style="display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700; color:var(--text-muted); cursor:pointer;">
         <input type="checkbox" id="sig-remove-bg" checked> Remove white background
       </label>
    </div>

  </div>
</div>

<script>
  const FILE_ID = "{{ file.file_id }}";
  const ALL_PAGES = {{ pages | tojson | safe }};
  const INITIAL_PAGE = parseInt("{{ initial_page }}") || 1;

  let remarksList = ALL_PAGES.filter(p => p.has_remarks);
  let currentIndex = Math.max(remarksList.findIndex(p => p.page_number === INITIAL_PAGE), 0);
  let canvas, sigPad, currentTool = 'select', zoom=1, baseScale=1, isDirty=false;

  window.addEventListener('load', () => {
    canvas = new fabric.Canvas('report-canvas', { backgroundColor:'#fff', preserveObjectStacking:true });
    if (!remarksList.length) { alert('No flagged pages found.'); window.location.href='/file/'+FILE_ID; return; }
    loadReport(remarksList[currentIndex]);
    initListeners();
    initSigPad();
  });

  function initSigPad() {
    const c = document.getElementById('sig-pad');
    sigPad = new SignaturePad(c, { penColor:'#000', minWidth:1 });
    window.addEventListener('resize', () => {
      const r = window.devicePixelRatio || 1;
      c.width = c.offsetWidth * r; c.height = c.offsetHeight * r;
      c.getContext('2d').scale(r, r);
    });
  }

  async function loadReport(page) {
    document.getElementById('loader').style.display='flex';
    document.getElementById('page-counter').textContent = `PAGE ${page.page_number}`;
    document.getElementById('btn-prev').disabled = currentIndex === 0;
    document.getElementById('btn-next').disabled = currentIndex === remarksList.length-1;

    try {
      const res = await fetch(`/api/file/${FILE_ID}/load-canvas?page_number=${page.page_number}`);
      const data = await res.json();
      fabric.Image.fromURL(page.image_url, (img) => {
        const cont = document.getElementById('canvas-container');
        const vpH = cont.clientHeight - 100;
        const vpW = cont.clientWidth - 32;
        
        if (window.innerWidth <= 768) {
          baseScale = Math.min(vpW / img.width, 1);
        } else {
          baseScale = Math.min(vpH / img.height, 1);
        }
        
        canvas.setDimensions({ width: img.width*baseScale, height: img.height*baseScale });
        canvas.clear();
        if (data.canvas_state) {
          canvas.loadFromJSON(data.canvas_state, () => finalizeLoad(img));
        } else {
          finalizeLoad(img);
        }
      }, { crossOrigin:'anonymous' });
    } catch(e) { document.getElementById('loader').style.display='none'; }
  }

  function finalizeLoad(img) {
    img.set({ left:0, top:0, scaleX:baseScale, scaleY:baseScale, selectable:false, evented:false, isBackground:true });
    canvas.add(img).sendToBack(img);
    canvas.renderAll();
    resetZoom();
    document.getElementById('loader').style.display='none';
    isDirty=false;
  }

  function navigate(d) {
    if (isDirty && !confirm('Discard changes?')) return;
    currentIndex += d; loadReport(remarksList[currentIndex]);
  }

  function toggleTray(id, btn) {
    const tray = document.getElementById(id);
    const wasActive = tray.classList.contains('active');
    document.querySelectorAll('.dock-tray').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
    if (!wasActive) { tray.classList.add('active'); btn.classList.add('active'); }
  }

  function placeTitle() {
    const v = document.getElementById('title-input').value.trim(); if(!v) return;
    const t = new fabric.IText(v, { left:canvas.width/2, top:40, fontSize:32, fontFamily:'Sora', fontWeight:'800', originX:'center' });
    canvas.add(t).setActiveObject(t); canvas.renderAll();
  }

  function placeContent() {
    const v = document.getElementById('remarks-input').value.trim(); if(!v) return;
    const t = new fabric.IText(v, { left:40, top:100, fontSize:20, fontFamily:'Manrope', width:300 });
    canvas.add(t).setActiveObject(t); canvas.renderAll();
  }

  function setTool(t) {
    currentTool = t;
    document.querySelectorAll('.tool-btn-small').forEach(b => b.classList.remove('active'));
    if (t==='tick-green') document.getElementById('tool-tick').classList.add('active');
  }

  function deleteSelected() {
    canvas.getActiveObjects().forEach(o=>{if(!o.isBackground)canvas.remove(o);}); 
    canvas.discardActiveObject().renderAll();
  }

  function toggleBold() { const o=canvas.getActiveObject(); if(o && o.type==='i-text') { o.set('fontWeight', o.fontWeight==='800'?'normal':'800'); canvas.renderAll(); } }
  function toggleItalic() { const o=canvas.getActiveObject(); if(o && o.type==='i-text') { o.set('fontStyle', o.fontStyle==='italic'?'normal':'italic'); canvas.renderAll(); } }
  function adjustFontSize(d) {
    const val = document.getElementById('font-size-val');
    const s = Math.max(8, Math.min(parseInt(val.textContent)+d, 120));
    val.textContent = s;
    canvas.getActiveObjects().forEach(o => { if(o.type==='i-text') o.set('fontSize', s); });
    canvas.renderAll();
  }

  function initListeners() {
    canvas.on('mouse:down', (o) => {
       if (currentTool === 'tick-green' && !o.target) {
         const p = canvas.getPointer(o.e);
         const tick = new fabric.Text('✔', { left:p.x, top:p.y, fontSize:50, fill:'#2e7d32', fontWeight:'800' });
         canvas.add(tick).renderAll(); setTool('select');
       }
    });
    canvas.on('object:added', ()=>isDirty=true);
    canvas.on('object:modified', ()=>isDirty=true);
  }

  function zoomIn() { if(zoom<4){ zoom+=.2; applyZoom(); } }
  function zoomOut() { if(zoom>.2){ zoom-=.2; applyZoom(); } }
  function resetZoom() { zoom=1; applyZoom(); }
  function applyZoom() {
    canvas.setZoom(zoom);
    const bg = canvas.getObjects('image').find(o=>o.isBackground);
    const w = bg.width*baseScale*zoom, h = bg.height*baseScale*zoom;
    canvas.setDimensions({ width:w, height:h });
    document.getElementById('zoom-label').textContent = Math.round(zoom*100)+'%';
  }

  // ── Signature Logic ──
  let selectedSigFont = "'Dancing Script', cursive";
  
  function switchSigTab(tab, ev) {
    document.querySelectorAll('.sig-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sig-pane').forEach(p => p.classList.remove('active'));
    if(ev) ev.currentTarget.classList.add('active');
    document.getElementById('sig-pane-' + tab).classList.add('active');
    
    // Refresh canvas size if switching back to draw
    if(tab === 'draw') {
      setTimeout(() => { 
        const c=document.getElementById('sig-pad'); 
        const r=window.devicePixelRatio||1; 
        c.width=c.offsetWidth*r; 
        c.height=c.offsetHeight*r; 
        c.getContext('2d').scale(r,r); 
        sigPad.clear(); 
      }, 10);
    }
  }

  function updateSigTypePreviews() {
    const val = document.getElementById('sig-type-input').value || 'InspectAI Signature';
    document.querySelectorAll('.font-preview').forEach(p => p.textContent = val);
  }

  function selectSigFont(idx, el) {
    document.querySelectorAll('.font-preview').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');
    selectedSigFont = el.style.fontFamily;
  }

  function placeSigImage(dataUrl) {
    fabric.Image.fromURL(dataUrl, (img) => {
       const bg = canvas.getObjects('image').find(o=>o.isBackground);
       img.scale((bg.width*0.25)/img.width);
       canvas.add(img).centerObject(img).setActiveObject(img).renderAll();
       closeSignatureModal();
    });
  }

  function applySignatureDraw() {
    if (sigPad.isEmpty()) return;
    placeSigImage(sigPad.toDataURL());
  }

  function applySignatureType() {
    const v = document.getElementById('sig-type-input').value.trim();
    if (!v) return;
    const t = new fabric.Text(v, {
      left: canvas.width/2, top: canvas.height/2,
      fontFamily: selectedSigFont.split(',')[0].replace(/['"]/g,''),
      fontSize: 80, fill: '#000', originX: 'center', originY: 'center'
    });
    canvas.add(t).setActiveObject(t).renderAll();
    closeSignatureModal();
  }

  async function handleSigUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    const removeBg = document.getElementById('sig-remove-bg').checked;
    
    if (removeBg) {
      const formData = new FormData();
      formData.append('file', file);
      
      try {
        const response = await fetch('/api/reports/remove-background', {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) {
          const errData = await response.json().catch(()=>({}));
          alert(errData.message || 'Background removal failed. Falling back to original image.');
          // Fallback to original
          fallbackLoadOriginal(file);
          return;
        }
        
        const blob = await response.blob();
        const reader = new FileReader();
        reader.onload = (f) => placeSigImage(f.target.result);
        reader.readAsDataURL(blob);
      } catch (err) {
        alert('Network error during background removal. Falling back to original.');
        fallbackLoadOriginal(file);
      }
    } else {
      fallbackLoadOriginal(file);
    }
    
    e.target.value = ''; // Reset input
  }

  function fallbackLoadOriginal(file) {
    const reader = new FileReader();
    reader.onload = (f) => placeSigImage(f.target.result);
    reader.readAsDataURL(file);
  }

  function openSignatureModal() { 
    document.getElementById('sig-modal').classList.remove('hidden'); 
    switchSigTab('draw'); // Default to draw
    const firstTab = document.querySelector('.sig-tab');
    if(firstTab) firstTab.classList.add('active');
  }
  function closeSignatureModal() { document.getElementById('sig-modal').classList.add('hidden'); }

  async function saveReport() {
    const btn = document.getElementById('btn-save'); btn.disabled=true;
    try {
      const bg = canvas.getObjects('image').find(o=>o.isBackground);
      const oldZ=canvas.getZoom(), oldW=canvas.width, oldH=canvas.height;
      canvas.setDimensions({width:bg.width, height:bg.height}).setZoom(1/baseScale);
      const imgData = canvas.toDataURL({format:'png', quality:1});
      canvas.setDimensions({width:oldW, height:oldH}).setZoom(oldZ);
      
      const res = await fetch(`/api/file/${FILE_ID}/save-canvas`, {
         method:'POST',
         headers:{'Content-Type':'application/json'},
         body: JSON.stringify({ canvas_state: JSON.stringify(canvas.toJSON()), page_number: remarksList[currentIndex].page_number, image_data: imgData })
      });
      if ((await res.json()).success) { alert('Saved!'); isDirty=false; }
    } finally { btn.disabled=false; }
  }

  function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const bg = canvas.getObjects('image').find(o=>o.isBackground);
    const pdf = new jsPDF(bg.width>bg.height?'l':'p', 'px', [bg.width, bg.height]);
    const oldZ=canvas.getZoom(), oldW=canvas.width, oldH=canvas.height;
    canvas.setDimensions({width:bg.width, height:bg.height}).setZoom(1/baseScale);
    pdf.addImage(canvas.toDataURL({format:'png', quality:1}),'PNG',0,0,bg.width,bg.height);
    canvas.setDimensions({width:oldW, height:oldH}).setZoom(oldZ);
    pdf.save(`InspectAI_P${remarksList[currentIndex].page_number}.pdf`);
  }

  // Hotkeys
  document.addEventListener('keydown', e => {
     if(e.key==='Delete') { canvas.getActiveObjects().forEach(o=>{if(!o.isBackground)canvas.remove(o);}); canvas.discardActiveObject().renderAll(); }
     if(e.ctrlKey && e.key==='s'){ e.preventDefault(); saveReport(); }
  });
</script>
</body>
</html>
